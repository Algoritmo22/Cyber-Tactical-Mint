██║      ╚████╔╝ ██████╔╝█████╗  ██████╔╝
██║       ╚██╔╝  ██╔══██╗██╔══╝  ██╔══██╗
╚██████╗   ██║   ██████╔╝███████╗██║  ██║
 ╚═════╝   ╚═╝   ╚══════╝╚══════╝╚═╝  ╚═╝
${color 00FFFF}SYSTEM TACTICAL OVERVIEW -------------------${color}
${color FFFFFF}OS:$color ${execi 86400 lsb_release -ds}
${color FFFFFF}Kernel:$color $kernel
${color FFFFFF}Uptime:$color $uptime

${color 00FFFF}CPU RECOGNITION ---------------------------${color}
${color FFFFFF}Usage:$color $cpu% ${color 00FF66}${cpubar 6,180}${color}
${color FFFFFF}Core 1:$color ${cpu cpu1}% ${goto 120}${color FFFFFF}Core 2:$color ${cpu cpu2}%
${color FFFFFF}Core 3:$color ${cpu cpu3}% ${goto 120}${color FFFFFF}Core 4:$color ${cpu cpu4}%

${color 00FFFF}MEMORY CONTROL ----------------------------${color}
${color FFFFFF}RAM Usage:$color $mem/$memmax - $memperc%
${color 00FF66}${membar 6,280}${color}
${color FFFFFF}Swap:$color $swap/$swapmax

${color 00FFFF}NETWORK HUD (wlan0) ------------------------${color}
${color FFFFFF}Inbound:$color ${downspeed wlan0} ${goto 160}${color FFFFFF}Outbound:$color ${upspeed wlan0}
${color 00FF66}${downspeedgraph wlan0 35,130 00FF66 00FFFF} ${goto 160}${upspeedgraph wlan0 35,130 00FF66 00FFFF}${color}

${color 00FFFF}STORAGE AREA ------------------------------${color}
${color FFFFFF}System Root (/) :$color ${fs_used /}/${fs_size /} 
${color 00FF66}${fs_bar 6,280 /}${color}
]]
