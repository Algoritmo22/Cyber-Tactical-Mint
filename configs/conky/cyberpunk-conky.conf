    default_outline_color = '000000',
    default_shade_color = '000000',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_window_hints = 'override_redirect,below,sticky,skip_taskbar,skip_pager',
    gap_x = 30,
    gap_y = 60,
    minimum_width = 350,
    minimum_height = 700,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    extra_window_hints = 'skip_taskbar,skip_pager',
    own_window = true,
